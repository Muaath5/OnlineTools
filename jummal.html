<!DOCTYPE html>
<html dir="rtl" lang="ar" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حساب الجُمَّل</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-tool="jummal">
  <div class="page-wrap"
       id="jummal-app"
       data-label-total="المجموع الكلي"
       data-label-word="الحرف"
       data-label-value="القيمة"
       data-label-mode="الترتيب"
       data-label-abjadi="أبجدي"
       data-label-alpha="ألفبائي">
    <h1>حساب الجُمَّل</h1>
    <p class="text-secondary mb-4">حساب القيمة العددية للكلمات العربية (أبجدي أو ألفبائي).</p>

    <div class="mb-3">
      <label for="output" class="form-label">النتيجة</label>
      <textarea id="output" class="form-control w-100" readonly></textarea>
    </div>

    <div class="mb-3">
      <label for="input" class="form-label">المدخل</label>
      <textarea id="input" class="form-control w-100" placeholder="اكتب كلمة أو أكثر..."></textarea>
    </div>

    <div class="d-flex gap-2 flex-wrap mb-3">
      <button id="toggle-btn" type="button" class="btn btn-outline-info">أبجدي / ألفبائي</button>
      <button type="button" class="btn btn-outline-primary"
              data-bs-toggle="collapse" data-bs-target="#ref-table">
        عرض الجدول
      </button>
    </div>

    <div id="ref-table" class="collapse table-panel">
      <div class="card card-body">
        <div id="table-container"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
