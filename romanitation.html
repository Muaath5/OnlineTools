<!DOCTYPE html>
<html dir="rtl" lang="ar" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الكتابة اللاتينية</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-tool="roman">
  <div class="page-wrap"
       id="roman-app"
       data-label-roman="لاتيني"
       data-label-arabic="عربي">
    <h1>الكتابة اللاتينية</h1>
    <p class="text-secondary mb-4">تحويل ثنائي الاتجاه بين العربية والحروف اللاتينية العلمية.</p>

    <div class="mb-3">
      <label for="output" class="form-label">النتيجة</label>
      <textarea id="output" class="form-control w-100" readonly></textarea>
    </div>

    <div class="mb-3">
      <label for="input" class="form-label">المدخل</label>
      <textarea id="input" class="form-control w-100" placeholder="اكتب هنا..."></textarea>
    </div>

    <div class="d-flex gap-2 flex-wrap mb-3">
      <button id="swap-btn" type="button" class="btn btn-secondary">تبديل</button>
      <button type="button" class="btn btn-outline-primary"
              data-bs-toggle="collapse" data-bs-target="#ref-table">
        عرض الجدول
      </button>
    </div>

    <div id="ref-table" class="collapse table-panel">
      <div class="card card-body">
        <div id="table-container"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
