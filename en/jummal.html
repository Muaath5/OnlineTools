<!DOCTYPE html>
<html dir="ltr" lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jummal (Gematria)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body data-tool="jummal">
  <div class="page-wrap"
       id="jummal-app"
       data-label-total="Total"
       data-label-word="Letter"
       data-label-value="Value"
       data-label-mode="Order"
       data-label-abjadi="Abjadi Hawwaz"
       data-label-alpha="Alphabetical">
    <h1>Jummal (Gematria)</h1>
    <p class="text-secondary mb-4">Compute the numerical value of Arabic words (Abjadi or Alphabetical order).</p>

    <div class="mb-3">
      <label for="output" class="form-label">Result</label>
      <textarea id="output" class="form-control w-100" readonly></textarea>
    </div>

    <div class="mb-3">
      <label for="input" class="form-label">Input</label>
      <textarea id="input" class="form-control w-100" placeholder="Type an Arabic word or more..."></textarea>
    </div>

    <div class="d-flex gap-2 flex-wrap mb-3">
      <button id="toggle-btn" type="button" class="btn btn-outline-info">Abjadi / Alphabetical</button>
      <button type="button" class="btn btn-outline-primary"
              data-bs-toggle="collapse" data-bs-target="#ref-table">
        Show Table
      </button>
    </div>

    <div id="ref-table" class="collapse table-panel">
      <div class="card card-body">
        <div id="table-container"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../app.js"></script>
</body>
</html>
