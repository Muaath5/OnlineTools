<!DOCTYPE html>
<html dir="ltr" lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Analyzer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body data-tool="harakat">
  <div class="page-wrap"
       id="harakat-app"
       data-label-words="Words"
       data-label-lines="Lines"
       data-label-chars-all="Characters (with spaces)"
       data-label-chars-no-sp="Characters (no spaces)"
       data-label-harakat="Harakat (total)"
       data-label-fatha="Fatha"
       data-label-damma="Damma"
       data-label-kasra="Kasra"
       data-label-shadda="Shadda"
       data-label-sukun="Sukun"
       data-label-tan-fat="Tanwin Fath"
       data-label-tan-dam="Tanwin Damm"
       data-label-tan-kas="Tanwin Kasr"
       data-label-dots="Dots (total)"
       data-label-hamza="Hamza count"
       data-label-copy="Copy"
       data-label-copied="Copied">
    <h1>Text Analyzer</h1>
    <p class="text-secondary mb-4">Detailed statistics for Arabic text, with cleanup utilities.</p>

    <div class="mb-3">
      <label for="input" class="form-label">Text</label>
      <textarea id="input" class="form-control w-100" placeholder="Type or paste text here..."></textarea>
    </div>

    <div class="card mb-4">
      <div class="card-body p-0">
        <div id="stats"></div>
      </div>
    </div>

    <div class="mb-3">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <label for="out-a" class="form-label mb-0">Without Harakat</label>
        <button type="button" class="btn btn-sm btn-outline-secondary" data-copy-target="out-a">Copy</button>
      </div>
      <textarea id="out-a" class="form-control w-100" readonly></textarea>
    </div>

    <div class="mb-3">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <label for="out-b" class="form-label mb-0">Without Dots</label>
        <button type="button" class="btn btn-sm btn-outline-secondary" data-copy-target="out-b">Copy</button>
      </div>
      <textarea id="out-b" class="form-control w-100" readonly></textarea>
    </div>

    <div class="mb-3">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <label for="out-c" class="form-label mb-0">Old Style</label>
        <button type="button" class="btn btn-sm btn-outline-secondary" data-copy-target="out-c">Copy</button>
      </div>
      <textarea id="out-c" class="form-control w-100" readonly></textarea>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../app.js"></script>
</body>
</html>
