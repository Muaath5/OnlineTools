<!DOCTYPE html>
<html dir="rtl" lang="ar" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شفرة مورس</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-tool="morse">
  <div class="page-wrap">
    <h1>شفرة مورس</h1>
    <p class="text-secondary mb-4">تحويل ثنائي الاتجاه بين النص الإنجليزي وشفرة مورس الدولية.</p>

    <div class="mb-3">
      <label for="output" class="form-label">النتيجة</label>
      <textarea id="output" class="form-control font-monospace w-100" readonly></textarea>
    </div>

    <div class="mb-3">
      <label for="input" class="form-label">المدخل</label>
      <textarea id="input" class="form-control w-100" placeholder="اكتب هنا..."></textarea>
    </div>

    <div class="d-flex gap-2 flex-wrap mb-3">
      <button id="swap-btn" type="button" class="btn btn-secondary">تبديل</button>
      <button type="button" class="btn btn-outline-primary"
              data-bs-toggle="collapse" data-bs-target="#ref-table">
        عرض الجدول
      </button>
    </div>

    <div id="ref-table" class="collapse table-panel">
      <div class="card card-body">
        <table class="table table-sm table-bordered table-dark mb-0">
          <thead><tr><th>الحرف</th><th>الشفرة</th></tr></thead>
          <tbody>
            <tr><td>A</td><td>.-</td></tr>
            <tr><td>B</td><td>-...</td></tr>
            <tr><td>C</td><td>-.-.</td></tr>
            <tr><td>D</td><td>-..</td></tr>
            <tr><td>E</td><td>.</td></tr>
            <tr><td>F</td><td>..-.</td></tr>
            <tr><td>G</td><td>--.</td></tr>
            <tr><td>H</td><td>....</td></tr>
            <tr><td>I</td><td>..</td></tr>
            <tr><td>J</td><td>.---</td></tr>
            <tr><td>K</td><td>-.-</td></tr>
            <tr><td>L</td><td>.-..</td></tr>
            <tr><td>M</td><td>--</td></tr>
            <tr><td>N</td><td>-.</td></tr>
            <tr><td>O</td><td>---</td></tr>
            <tr><td>P</td><td>.--.</td></tr>
            <tr><td>Q</td><td>--.-</td></tr>
            <tr><td>R</td><td>.-.</td></tr>
            <tr><td>S</td><td>...</td></tr>
            <tr><td>T</td><td>-</td></tr>
            <tr><td>U</td><td>..-</td></tr>
            <tr><td>V</td><td>...-</td></tr>
            <tr><td>W</td><td>.--</td></tr>
            <tr><td>X</td><td>-..-</td></tr>
            <tr><td>Y</td><td>-.--</td></tr>
            <tr><td>Z</td><td>--..</td></tr>
            <tr><td>0</td><td>-----</td></tr>
            <tr><td>1</td><td>.----</td></tr>
            <tr><td>2</td><td>..---</td></tr>
            <tr><td>3</td><td>...--</td></tr>
            <tr><td>4</td><td>....-</td></tr>
            <tr><td>5</td><td>.....</td></tr>
            <tr><td>6</td><td>-....</td></tr>
            <tr><td>7</td><td>--...</td></tr>
            <tr><td>8</td><td>---..</td></tr>
            <tr><td>9</td><td>----.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
